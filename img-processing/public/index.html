<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Upload</title>
    <style>
      body {
        max-width: 36rem;
        margin: 4rem auto;
        padding: 0 1rem;
        font-family: system-ui, sans-serif;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      button {
        width: fit-content;
        padding: 0.5rem 1rem;
      }

      #output[hidden] {
        display: none;
      }

      #processed-image {
        display: block;
        max-width: 100%;
        margin-top: 1rem;
      }

      pre {
        padding: 1rem;
        background: #f4f4f4;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Upload image</h1>

    <form id="upload-form">
      <input type="file" name="image" accept="image/*" required />
      <select name="operation" required>
        <option value="grayscale">Grayscale</option>
        <option value="sharpen">Sharpen</option>
        <option value="blur">Blur</option>
        <option value="webp">WebP</option>
      </select>
      <button type="submit">Upload and process</button>
    </form>

    <section id="output" hidden>
      <p><strong>Job ID:</strong> <span id="job-id"></span></p>
      <p><strong>Status:</strong> <span id="status"></span></p>
      <a id="result-link" href="#" target="_blank" rel="noreferrer" hidden>
        Open processed image
      </a>
      <img id="processed-image" alt="Processed result" hidden />
      <pre id="details"></pre>
    </section>

    <script>
      const form = document.querySelector("#upload-form");
      const button = form.querySelector("button");
      const output = document.querySelector("#output");
      const jobId = document.querySelector("#job-id");
      const status = document.querySelector("#status");
      const resultLink = document.querySelector("#result-link");
      const processedImage = document.querySelector("#processed-image");
      const details = document.querySelector("#details");
      let pollTimer;

      function showResponse(data) {
        output.hidden = false;
        details.textContent = JSON.stringify(data, null, 2);
      }

      function stopPolling() {
        clearTimeout(pollTimer);
        pollTimer = undefined;
        button.disabled = false;
      }

      async function pollImage(id) {
        try {
          const response = await fetch(`/images/${id}`);
          const data = await response.json();

          showResponse(data);

          if (!response.ok) {
            throw new Error(data.error || "Failed to get image status");
          }

          status.textContent = data.status;

          if (data.status === "completed" && data.resultUrl) {
            resultLink.href = data.resultUrl;
            resultLink.hidden = false;
            processedImage.src = data.resultUrl;
            processedImage.hidden = false;
            stopPolling();
            return;
          }

          if (data.status === "failed" || data.status === "deleted") {
            stopPolling();
            return;
          }

          pollTimer = setTimeout(() => pollImage(id), 1_000);
        } catch (error) {
          status.textContent = "error";
          details.textContent = error.message;
          stopPolling();
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        stopPolling();
        button.disabled = true;
        output.hidden = false;
        jobId.textContent = "";
        status.textContent = "uploading";
        resultLink.hidden = true;
        processedImage.hidden = true;
        processedImage.removeAttribute("src");
        details.textContent = "Uploading original image...";

        try {
          const response = await fetch("/images", {
            method: "POST",
            body: new FormData(form),
          });
          const data = await response.json();

          showResponse(data);

          if (!response.ok) {
            throw new Error(data.error || "Failed to create image job");
          }

          jobId.textContent = data.id;
          status.textContent = data.status;
          pollImage(data.id);
        } catch (error) {
          status.textContent = "error";
          details.textContent = error.message;
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
